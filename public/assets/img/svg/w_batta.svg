<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#e8f5e9" rx="8"/>
  <!-- body -->
  <ellipse cx="42" cy="52" rx="24" ry="12" fill="#5a9a2a" stroke="#3a7a1a" strokeWidth="2.5"/>
  <!-- head -->
  <circle cx="64" cy="46" r="13" fill="#5a9a2a" stroke="#3a7a1a" strokeWidth="2"/>
  <!-- eye -->
  <circle cx="70" cy="43" r="5" fill="#212121"/>
  <circle cx="71" cy="42" r="2" fill="white"/>
  <!-- antennae -->
  <line x1="70" y1="35" x2="80" y2="22" stroke="#3a7a1a" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="72" y1="33" x2="84" y2="24" stroke="#3a7a1a" strokeWidth="1.5" strokeLinecap="round"/>
  <!-- hind leg -->
  <path d="M28,52 Q16,38 10,42 Q6,50 14,56" fill="none" stroke="#3a7a1a" strokeWidth="3.5" strokeLinecap="round"/>
  <path d="M34,56 Q22,44 16,46 Q10,54 18,58" fill="none" stroke="#3a7a1a" strokeWidth="3.5" strokeLinecap="round"/>
  <!-- front legs -->
  <line x1="52" y1="58" x2="60" y2="72" stroke="#3a7a1a" strokeWidth="2.5" strokeLinecap="round"/>
  <line x1="44" y1="60" x2="50" y2="74" stroke="#3a7a1a" strokeWidth="2.5" strokeLinecap="round"/>
  <!-- wing -->
  <path d="M32,46 Q42,28 58,36" fill="#88cc44" stroke="#5a9a2a" strokeWidth="1.5" opacity="0.7"/>
  <!-- grass -->
  <rect x="0" y="82" width="100" height="18" fill="#4caf50" rx="4"/>
</svg>
