<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fefce8" rx="8"/>
  <!-- key ring -->
  <circle cx="35" cy="35" r="18" fill="none" stroke="#fcd34d" strokeWidth="6"/>
  <circle cx="35" cy="35" r="9" fill="#fef9c3" stroke="#fcd34d" strokeWidth="3"/>
  <!-- key shaft -->
  <line x1="48" y1="48" x2="82" y2="82" stroke="#fcd34d" strokeWidth="7" strokeLinecap="round"/>
  <!-- key teeth -->
  <line x1="64" y1="64" x2="70" y2="58" stroke="#fcd34d" strokeWidth="5" strokeLinecap="round"/>
  <line x1="72" y1="72" x2="78" y2="66" stroke="#fcd34d" strokeWidth="5" strokeLinecap="round"/>
  <!-- shine -->
  <line x1="52" y1="50" x2="58" y2="56" stroke="white" strokeWidth="2.5" strokeLinecap="round" opacity="0.7"/>
</svg>
