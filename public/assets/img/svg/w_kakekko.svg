  <line x1="72" y1="46" x2="72" y2="82" stroke="#dc2626" strokeWidth="4"/>
  <!-- tape -->
  <path d="M72,52 Q80,56 88,52" fill="none" stroke="#dc2626" strokeWidth="2.5" strokeLinecap="round"/>
  <!-- runner 1 -->
  <circle cx="40" cy="46" r="8" fill="#fbbf24"/>
  <rect x="34" y="54" width="12" height="14" fill="#3b82f6" rx="3"/>
  <line x1="34" y1="58" x2="26" y2="50" stroke="#fbbf24" strokeWidth="4" strokeLinecap="round"/>
  <line x1="46" y1="58" x2="54" y2="50" stroke="#fbbf24" strokeWidth="4" strokeLinecap="round"/>
  <line x1="36" y1="68" x2="28" y2="80" stroke="#fbbf24" strokeWidth="4" strokeLinecap="round"/>
  <line x1="44" y1="68" x2="52" y2="78" stroke="#fbbf24" strokeWidth="4" strokeLinecap="round"/>
  <!-- runner 2 -->
  <circle cx="58" cy="46" r="8" fill="#f9a8d4"/>
  <rect x="52" y="54" width="12" height="14" fill="#ec4899" rx="3"/>
  <line x1="52" y1="58" x2="44" y2="52" stroke="#f9a8d4" strokeWidth="4" strokeLinecap="round"/>
  <line x1="64" y1="58" x2="72" y2="50" stroke="#f9a8d4" strokeWidth="4" strokeLinecap="round"/>
  <line x1="54" y1="68" x2="46" y2="80" stroke="#f9a8d4" strokeWidth="4" strokeLinecap="round"/>
  <line x1="62" y1="68" x2="70" y2="78" stroke="#f9a8d4" strokeWidth="4" strokeLinecap="round"/>
</svg>
