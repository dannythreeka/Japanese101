<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- wall -->
  <rect x="12" y="20" width="76" height="65" fill="#e7e5e4" rx="4" stroke="#78716c" stroke-width="3"/>
  <!-- window frame -->
  <rect x="20" y="28" width="60" height="50" fill="#bae6fd" rx="3" stroke="#0369a1" stroke-width="3"/>
  <!-- cross divider horizontal -->
  <line x1="20" y1="53" x2="80" y2="53" stroke="#0369a1" stroke-width="3"/>
  <!-- cross divider vertical -->
  <line x1="50" y1="28" x2="50" y2="78" stroke="#0369a1" stroke-width="3"/>
  <!-- light reflection -->
  <line x1="26" y1="34" x2="36" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="40" x2="32" y2="40" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
