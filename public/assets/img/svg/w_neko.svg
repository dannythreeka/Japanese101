<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fff8f0" rx="8"/>
  <!-- body -->
  <ellipse cx="50" cy="70" rx="26" ry="20" fill="#e8a050" stroke="#c87828" strokeWidth="2.5"/>
  <!-- head -->
  <circle cx="50" cy="42" r="22" fill="#e8a050" stroke="#c87828" strokeWidth="2.5"/>
  <!-- ears -->
  <polygon points="30,26 24,14 36,20" fill="#e8a050" stroke="#c87828" strokeWidth="2"/>
  <polygon points="70,26 76,14 64,20" fill="#e8a050" stroke="#c87828" strokeWidth="2"/>
  <polygon points="30,25 26,17 35,21" fill="#f0b870" opacity="0.6"/>
  <polygon points="70,25 74,17 65,21" fill="#f0b870" opacity="0.6"/>
  <!-- eyes open -->
  <ellipse cx="40" cy="40" rx="5" ry="6" fill="#2a8a2a"/>
  <ellipse cx="60" cy="40" rx="5" ry="6" fill="#2a8a2a"/>
  <ellipse cx="40" cy="41" rx="2.5" ry="4" fill="#1a1a1a"/>
  <ellipse cx="60" cy="41" rx="2.5" ry="4" fill="#1a1a1a"/>
  <circle cx="41" cy="39" r="1.2" fill="white"/>
  <circle cx="61" cy="39" r="1.2" fill="white"/>
  <!-- nose -->
  <path d="M46,48 L50,52 L54,48 Q50,46 46,48Z" fill="#d86090"/>
  <!-- whiskers -->
  <line x1="28" y1="50" x2="44" y2="50" stroke="#c87828" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="26" y1="54" x2="42" y2="52" stroke="#c87828" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="56" y1="50" x2="72" y2="50" stroke="#c87828" strokeWidth="1.5" strokeLinecap="round"/>
  <line x1="58" y1="52" x2="74" y2="54" stroke="#c87828" strokeWidth="1.5" strokeLinecap="round"/>
  <!-- stripes -->
  <path d="M36,62 Q40,70 38,76" fill="none" stroke="#c87828" strokeWidth="2" strokeLinecap="round"/>
  <path d="M50,60 Q52,68 50,76" fill="none" stroke="#c87828" strokeWidth="2" strokeLinecap="round"/>
  <path d="M64,62 Q60,70 62,76" fill="none" stroke="#c87828" strokeWidth="2" strokeLinecap="round"/>
  <!-- tail -->
  <path d="M26,72 Q12,65 8,74 Q6,82 14,86" fill="none" stroke="#e8a050" strokeWidth="5" strokeLinecap="round"/>
</svg>
