<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#f0f4ff" rx="8"/>
  <!-- body -->
  <ellipse cx="50" cy="70" rx="18" ry="22" fill="#7a8a9a" stroke="#6a7a8a" strokeWidth="2.5"/>
  <!-- head -->
  <circle cx="50" cy="40" r="17" fill="#fcd5b0" stroke="#e8b88a" strokeWidth="2"/>
  <!-- white hair -->
  <path d="M35,36 Q37,24 50,22 Q63,24 65,36" fill="#e0e0e0" stroke="#d0d0d0" strokeWidth="1.5"/>
  <ellipse cx="37" cy="38" rx="7" ry="9" fill="#e0e0e0" stroke="#d0d0d0" strokeWidth="1.5"/>
  <ellipse cx="63" cy="38" rx="7" ry="9" fill="#e0e0e0" stroke="#d0d0d0" strokeWidth="1.5"/>
  <!-- smile eyes -->
  <path d="M40,38 Q44,35 48,38" fill="none" stroke="#3a2010" strokeWidth="2" strokeLinecap="round"/>
  <path d="M52,38 Q56,35 60,38" fill="none" stroke="#3a2010" strokeWidth="2" strokeLinecap="round"/>
  <path d="M43,46 Q50,50 57,46" fill="none" stroke="#c87040" strokeWidth="1.5" strokeLinecap="round"/>
  <!-- cane -->
  <path d="M72,55 L78,95" stroke="#8b6340" strokeWidth="4" strokeLinecap="round"/>
  <path d="M78,95 Q82,99 85,95" fill="none" stroke="#8b6340" strokeWidth="3" strokeLinecap="round"/>
  <!-- arm with cane -->
  <path d="M66,60 Q70,62 78,60" fill="none" stroke="#7a8a9a" strokeWidth="6" strokeLinecap="round"/>
  <!-- other arm wave -->
  <path d="M34,62 Q22,56 16,64" fill="none" stroke="#7a8a9a" strokeWidth="6" strokeLinecap="round"/>
  <circle cx="16" cy="64" r="7" fill="#fcd5b0" stroke="#e8b88a" strokeWidth="2"/>
</svg>
