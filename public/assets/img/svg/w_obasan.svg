<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fdf4ff" rx="8"/>
  <!-- body -->
  <ellipse cx="50" cy="70" rx="20" ry="22" fill="#e879f9" stroke="#d946ef" strokeWidth="2.5"/>
  <!-- head -->
  <circle cx="50" cy="40" r="18" fill="#fcd5b0" stroke="#e8b88a" strokeWidth="2"/>
  <!-- hair -->
  <path d="M34,36 Q36,24 50,22 Q64,24 66,36" fill="#3a2a1a" stroke="#2a1a0a" strokeWidth="1.5"/>
  <path d="M33,37 Q30,32 28,38" fill="#3a2a1a"/>
  <!-- eyes smile -->
  <path d="M40,38 Q44,35 48,38" fill="none" stroke="#3a2010" strokeWidth="2" strokeLinecap="round"/>
  <path d="M52,38 Q56,35 60,38" fill="none" stroke="#3a2010" strokeWidth="2" strokeLinecap="round"/>
  <path d="M43,46 Q50,50 57,46" fill="none" stroke="#c87040" strokeWidth="1.5" strokeLinecap="round"/>
  <!-- arms wave -->
  <path d="M32,62 Q18,58 12,68" fill="none" stroke="#e879f9" strokeWidth="7" strokeLinecap="round"/>
  <circle cx="12" cy="68" r="7" fill="#fcd5b0" stroke="#e8b88a" strokeWidth="2"/>
  <!-- other arm -->
  <path d="M68,62 Q80,60 84,68" fill="none" stroke="#e879f9" strokeWidth="7" strokeLinecap="round"/>
  <!-- legs -->
  <rect x="40" y="90" width="10" height="10" fill="#9333ea" rx="3"/>
  <rect x="52" y="90" width="10" height="10" fill="#9333ea" rx="3"/>
</svg>
