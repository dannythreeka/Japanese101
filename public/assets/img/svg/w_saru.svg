<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#f0e8d8" rx="8"/>
  <!-- body -->
  <ellipse cx="50" cy="68" rx="20" ry="18" fill="#c8874a" stroke="#a06030" strokeWidth="2.5"/>
  <!-- head -->
  <circle cx="50" cy="42" r="20" fill="#c8874a" stroke="#a06030" strokeWidth="2.5"/>
  <ellipse cx="50" cy="47" rx="12" ry="10" fill="#f0b87a"/>
  <!-- ears -->
  <circle cx="30" cy="40" r="8" fill="#c8874a" stroke="#a06030" strokeWidth="2"/>
  <circle cx="70" cy="40" r="8" fill="#c8874a" stroke="#a06030" strokeWidth="2"/>
  <!-- eyes -->
  <circle cx="43" cy="38" r="4" fill="#2a1a0a"/>
  <circle cx="57" cy="38" r="4" fill="#2a1a0a"/>
  <circle cx="44" cy="37" r="1.5" fill="white"/>
  <circle cx="58" cy="37" r="1.5" fill="white"/>
  <!-- smile -->
  <path d="M42,50 Q50,56 58,50" fill="none" stroke="#8a5020" strokeWidth="2" strokeLinecap="round"/>
  <!-- arms -->
  <path d="M30,65 Q18,58 14,70 Q12,80 20,82" fill="none" stroke="#c8874a" strokeWidth="5" strokeLinecap="round"/>
  <path d="M70,65 Q82,58 86,70 Q88,80 80,82" fill="none" stroke="#c8874a" strokeWidth="5" strokeLinecap="round"/>
  <!-- ground line -->
  <rect x="0" y="90" width="100" height="10" fill="#7bc97b" rx="4"/>
</svg>
