<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#fff7ed" rx="8"/>
  <!-- sunset sky gradient layers -->
  <rect width="100" height="100" fill="#f97316" rx="8"/>
  <rect x="0" y="30" width="100" height="40" fill="#fb923c" opacity="0.5"/>
  <rect x="0" y="55" width="100" height="25" fill="#dc2626" opacity="0.4"/>
  <rect x="0" y="72" width="100" height="28" fill="#1a2a1a" rx="4"/>
  <!-- sun on horizon -->
  <ellipse cx="50" cy="72" rx="28" ry="14" fill="#fbbf24" opacity="0.9"/>
  <!-- clouds dyed red -->
  <ellipse cx="24" cy="28" rx="18" ry="10" fill="#c2410c"/>
  <ellipse cx="14" cy="34" rx="12" ry="8" fill="#dc2626"/>
  <ellipse cx="36" cy="34" rx="12" ry="7" fill="#c2410c"/>
  <ellipse cx="72" cy="24" rx="16" ry="9" fill="#9a3412"/>
  <ellipse cx="62" cy="30" rx="12" ry="7" fill="#c2410c"/>
  <ellipse cx="83" cy="30" rx="11" ry="7" fill="#9a3412"/>
  <!-- mountain silhouettes -->
  <polygon points="0,72 28,42 56,72" fill="#0f1a0f"/>
  <polygon points="40,72 70,36 100,72" fill="#0f1a0f"/>
</svg>
