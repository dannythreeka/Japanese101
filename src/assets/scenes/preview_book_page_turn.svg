<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <defs>
    <linearGradient id="tableGradL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="100%" stop-color="#b8976a"/>
    </linearGradient>
    <linearGradient id="tableGradR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="100%" stop-color="#b8976a"/>
    </linearGradient>
    <clipPath id="lBook"><rect x="12" y="12" width="278" height="220" rx="16"/></clipPath>
    <clipPath id="rBook"><rect x="350" y="12" width="278" height="220" rx="16"/></clipPath>
  </defs>

  <!-- Card background -->
  <rect width="640" height="280" rx="20" fill="#f0ece8"/>

  <!-- ── LEFT: INITIAL (open book, calm) ─────────────────── -->
  <g clip-path="url(#lBook)">
    <!-- Room / neutral background -->
    <rect x="12" y="12" width="278" height="220" rx="16" fill="#f5f0e8"/>
    <!-- Table surface -->
    <rect x="12" y="178" width="278" height="54" fill="url(#tableGradL)"/>
    <!-- Table edge highlight -->
    <rect x="12" y="178" width="278" height="6" fill="#e8cba0"/>
    <!-- Book cover (closed bottom, open spread) -->
    <!-- Book shadow -->
    <ellipse cx="151" cy="188" rx="80" ry="8" fill="#a07850" opacity="0.25"/>
    <!-- Left book cover -->
    <rect x="68" y="100" width="78" height="84" rx="6" fill="#7a4018"/>
    <!-- Left page -->
    <rect x="72" y="104" width="70" height="76" rx="4" fill="#fffdf5"/>
    <!-- Spine -->
    <rect x="143" y="100" width="14" height="84" rx="3" fill="#5a2e0e"/>
    <!-- Right page -->
    <rect x="154" y="104" width="70" height="76" rx="4" fill="#fffdf5"/>
    <!-- Right book cover -->
    <rect x="154" y="100" width="78" height="84" rx="6" fill="#7a4018"/>
    <!-- Right page over cover -->
    <rect x="158" y="104" width="68" height="76" rx="4" fill="#fffdf5"/>
    <!-- Page line details on left page -->
    <g stroke="#ddd8cc" stroke-width="1.2" stroke-linecap="round">
      <line x1="80" y1="125" x2="136" y2="125"/>
      <line x1="80" y1="135" x2="136" y2="135"/>
      <line x1="80" y1="145" x2="136" y2="145"/>
      <line x1="80" y1="155" x2="120" y2="155"/>
    </g>
    <!-- Tree icon on left page -->
    <rect x="99" y="108" width="8" height="14" fill="#8b5e3c"/>
    <ellipse cx="103" cy="106" rx="12" ry="10" fill="#5aaa5a"/>
    <ellipse cx="96" cy="110" rx="8" ry="7" fill="#4a9a4a"/>
    <ellipse cx="110" cy="109" rx="8" ry="7" fill="#4a9a4a"/>
    <!-- Right page is blank with light ruled lines -->
    <g stroke="#ddd8cc" stroke-width="1.2" stroke-linecap="round">
      <line x1="165" y1="120" x2="220" y2="120"/>
      <line x1="165" y1="130" x2="220" y2="130"/>
      <line x1="165" y1="140" x2="220" y2="140"/>
      <line x1="165" y1="150" x2="220" y2="150"/>
      <line x1="165" y1="160" x2="200" y2="160"/>
    </g>
    <!-- Small bookmark ribbon -->
    <polygon points="218,104 224,104 224,122 221,118 218,122" fill="#e05858"/>
  </g>
  <text x="151" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#557" font-weight="600">初期 · つぎ</text>

  <!-- ── ARROW ── -->
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#a0b0c0">→</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#90a0b0">「つぎ!」</text>

  <!-- ── RIGHT: SUCCESS (page turning, bird appears) ──────── -->
  <g clip-path="url(#rBook)">
    <!-- Room background -->
    <rect x="350" y="12" width="278" height="220" rx="16" fill="#f5f0e8"/>
    <!-- Table surface -->
    <rect x="350" y="178" width="278" height="54" fill="url(#tableGradR)"/>
    <rect x="350" y="178" width="278" height="6" fill="#e8cba0"/>
    <!-- Book shadow -->
    <ellipse cx="489" cy="188" rx="80" ry="8" fill="#a07850" opacity="0.25"/>
    <!-- Left book cover -->
    <rect x="406" y="100" width="78" height="84" rx="6" fill="#7a4018"/>
    <!-- Left page (same tree) -->
    <rect x="410" y="104" width="70" height="76" rx="4" fill="#fffdf5"/>
    <rect x="437" y="108" width="8" height="14" fill="#8b5e3c"/>
    <ellipse cx="441" cy="106" rx="12" ry="10" fill="#5aaa5a"/>
    <ellipse cx="434" cy="110" rx="8" ry="7" fill="#4a9a4a"/>
    <ellipse cx="448" cy="109" rx="8" ry="7" fill="#4a9a4a"/>
    <g stroke="#ddd8cc" stroke-width="1.2" stroke-linecap="round">
      <line x1="418" y1="125" x2="474" y2="125"/>
      <line x1="418" y1="135" x2="474" y2="135"/>
      <line x1="418" y1="145" x2="474" y2="145"/>
      <line x1="418" y1="155" x2="458" y2="155"/>
    </g>
    <!-- Spine -->
    <rect x="481" y="100" width="14" height="84" rx="3" fill="#5a2e0e"/>
    <!-- Right page (new, bird illustration) -->
    <rect x="492" y="100" width="78" height="84" rx="6" fill="#7a4018"/>
    <rect x="496" y="104" width="68" height="76" rx="4" fill="#fffdf5"/>
    <!-- Bird icon on new page -->
    <!-- Body -->
    <ellipse cx="532" cy="138" rx="16" ry="11" fill="#4a90d9"/>
    <!-- Head -->
    <circle cx="548" cy="130" r="9" fill="#4a90d9"/>
    <!-- Beak -->
    <polygon points="556,129 563,131 556,133" fill="#f5a623"/>
    <!-- Eye -->
    <circle cx="551" cy="128" r="2" fill="white"/>
    <circle cx="552" cy="128" r="1" fill="#222"/>
    <!-- Wing -->
    <ellipse cx="525" cy="135" rx="10" ry="6" fill="#3a7abf" transform="rotate(-20 525 135)"/>
    <!-- Tail -->
    <polygon points="516,140 508,136 508,145" fill="#3a7abf"/>
    <!-- Feet -->
    <line x1="530" y1="148" x2="528" y2="155" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="536" y1="149" x2="534" y2="156" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="528" y1="155" x2="524" y2="158" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="528" y1="155" x2="528" y2="159" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="534" y1="156" x2="530" y2="159" stroke="#f5a623" stroke-width="1.5"/>
    <line x1="534" y1="156" x2="534" y2="160" stroke="#f5a623" stroke-width="1.5"/>
    <!-- Turning page (curled corner effect) -->
    <path d="M492,104 Q510,115 505,175 Q495,185 492,184" fill="#fff8e8" stroke="#ddd0bb" stroke-width="1"/>
    <!-- Motion sparkles near turning page -->
    <g fill="#ffd700" opacity="0.85">
      <circle cx="488" cy="108" r="2.5"/>
      <circle cx="483" cy="118" r="2"/>
      <circle cx="487" cy="130" r="1.8"/>
    </g>
    <!-- Bookmark -->
    <polygon points="556,104 562,104 562,122 559,118 556,122" fill="#e05858"/>
  </g>
  <text x="489" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#225588" font-weight="600">せいこう 📖 つぎ</text>

  <!-- Scene label -->
  <text x="320" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#889aaa">book_page_turn · Style Preview</text>
</svg>
