<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <defs>
    <linearGradient id="fieldSkyL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5bb8f5"/>
      <stop offset="100%" stop-color="#a8dff8"/>
    </linearGradient>
    <linearGradient id="fieldSkyR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5bb8f5"/>
      <stop offset="100%" stop-color="#a8dff8"/>
    </linearGradient>
    <clipPath id="lField"><rect x="12" y="12" width="278" height="220" rx="16"/></clipPath>
    <clipPath id="rField"><rect x="350" y="12" width="278" height="220" rx="16"/></clipPath>
  </defs>

  <!-- Card background -->
  <rect width="640" height="280" rx="20" fill="#f0ece8"/>

  <!-- ── LEFT: INITIAL (empty field) ─────────────────────── -->
  <g clip-path="url(#lField)">
    <!-- Sky -->
    <rect x="12" y="12" width="278" height="220" rx="16" fill="url(#fieldSkyL)"/>
    <!-- Grass ground -->
    <rect x="12" y="178" width="278" height="54" fill="#5cc85c"/>
    <!-- Rolling hill bumps -->
    <ellipse cx="80"  cy="178" rx="90" ry="22" fill="#5cc85c"/>
    <ellipse cx="250" cy="180" rx="80" ry="20" fill="#66cc66"/>
    <!-- White cloud -->
    <ellipse cx="100" cy="65" rx="44" ry="24" fill="white"/>
    <ellipse cx="76"  cy="74" rx="28" ry="20" fill="white"/>
    <ellipse cx="124" cy="74" rx="26" ry="19" fill="white"/>
    <!-- Small cloud -->
    <ellipse cx="230" cy="85" rx="28" ry="15" fill="white" opacity="0.85"/>
    <ellipse cx="210" cy="92" rx="18" ry="12" fill="white" opacity="0.85"/>
    <ellipse cx="250" cy="92" rx="16" ry="12" fill="white" opacity="0.85"/>
    <!-- Tree on right side -->
    <!-- Trunk -->
    <rect x="218" y="130" width="10" height="50" rx="4" fill="#8b5e3c"/>
    <!-- Foliage -->
    <ellipse cx="223" cy="118" rx="22" ry="20" fill="#3da83d"/>
    <ellipse cx="208" cy="128" rx="16" ry="14" fill="#4ab84a"/>
    <ellipse cx="238" cy="126" rx="15" ry="14" fill="#3da83d"/>
    <!-- Grass tufts -->
    <g stroke="#3da83d" stroke-width="2.5" stroke-linecap="round">
      <line x1="50"  y1="178" x2="48"  y2="168"/>
      <line x1="55"  y1="178" x2="57"  y2="167"/>
      <line x1="90"  y1="175" x2="88"  y2="165"/>
      <line x1="95"  y1="175" x2="97"  y2="164"/>
      <line x1="155" y1="178" x2="153" y2="168"/>
      <line x1="160" y1="178" x2="162" y2="167"/>
    </g>
    <!-- Empty field with no target — just open space -->
    <!-- Faint ground path -->
    <ellipse cx="151" cy="195" rx="55" ry="6" fill="#4ab54a" opacity="0.4"/>
  </g>
  <text x="151" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#557" font-weight="600">初期 · まと</text>

  <!-- ── ARROW ── -->
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#a0b0c0">→</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#90a0b0">「まと!」</text>

  <!-- ── RIGHT: SUCCESS (bullseye target with arrow) ──────── -->
  <g clip-path="url(#rField)">
    <!-- Sky -->
    <rect x="350" y="12" width="278" height="220" rx="16" fill="url(#fieldSkyR)"/>
    <!-- Grass ground -->
    <rect x="350" y="178" width="278" height="54" fill="#5cc85c"/>
    <ellipse cx="418" cy="178" rx="90" ry="22" fill="#5cc85c"/>
    <ellipse cx="588" cy="180" rx="80" ry="20" fill="#66cc66"/>
    <!-- White cloud -->
    <ellipse cx="438" cy="65" rx="44" ry="24" fill="white"/>
    <ellipse cx="414" cy="74" rx="28" ry="20" fill="white"/>
    <ellipse cx="462" cy="74" rx="26" ry="19" fill="white"/>
    <!-- Small cloud -->
    <ellipse cx="568" cy="85" rx="28" ry="15" fill="white" opacity="0.85"/>
    <ellipse cx="548" cy="92" rx="18" ry="12" fill="white" opacity="0.85"/>
    <ellipse cx="588" cy="92" rx="16" ry="12" fill="white" opacity="0.85"/>
    <!-- Tree (same position) -->
    <rect x="556" y="130" width="10" height="50" rx="4" fill="#8b5e3c"/>
    <ellipse cx="561" cy="118" rx="22" ry="20" fill="#3da83d"/>
    <ellipse cx="546" cy="128" rx="16" ry="14" fill="#4ab84a"/>
    <ellipse cx="576" cy="126" rx="15" ry="14" fill="#3da83d"/>
    <!-- Grass tufts -->
    <g stroke="#3da83d" stroke-width="2.5" stroke-linecap="round">
      <line x1="388" y1="178" x2="386" y2="168"/>
      <line x1="393" y1="178" x2="395" y2="167"/>
      <line x1="428" y1="175" x2="426" y2="165"/>
      <line x1="433" y1="175" x2="435" y2="164"/>
      <line x1="493" y1="178" x2="491" y2="168"/>
      <line x1="498" y1="178" x2="500" y2="167"/>
    </g>
    <!-- Target stand pole -->
    <rect x="487" y="148" width="6" height="34" rx="2" fill="#8b5e3c"/>
    <!-- Target stand legs -->
    <line x1="490" y1="180" x2="480" y2="192" stroke="#8b5e3c" stroke-width="3" stroke-linecap="round"/>
    <line x1="490" y1="180" x2="500" y2="192" stroke="#8b5e3c" stroke-width="3" stroke-linecap="round"/>
    <!-- Bullseye target circles (centered at 490, 118) -->
    <circle cx="490" cy="118" r="42" fill="#c0392b"/>
    <circle cx="490" cy="118" r="32" fill="white"/>
    <circle cx="490" cy="118" r="22" fill="#c0392b"/>
    <circle cx="490" cy="118" r="12" fill="white"/>
    <circle cx="490" cy="118" r="5"  fill="#c0392b"/>
    <!-- Thin black outline rings -->
    <circle cx="490" cy="118" r="42" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="490" cy="118" r="32" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="490" cy="118" r="22" fill="none" stroke="#333" stroke-width="1"/>
    <circle cx="490" cy="118" r="12" fill="none" stroke="#333" stroke-width="1"/>
    <!-- Arrow stuck in center -->
    <!-- Shaft -->
    <line x1="540" y1="75" x2="493" y2="116" stroke="#8b5e3c" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="493,116 487,112 499,110" fill="#555"/>
    <!-- Fletching -->
    <polygon points="540,75 548,70 542,80" fill="#e05858"/>
    <polygon points="540,75 546,68 545,77" fill="#c03030"/>
    <!-- Impact sparkles -->
    <g fill="#ffd700" opacity="0.9">
      <circle cx="480" cy="108" r="2.5"/>
      <circle cx="500" cy="106" r="2"/>
      <circle cx="476" cy="122" r="2"/>
      <circle cx="504" cy="120" r="2.5"/>
    </g>
    <g stroke="#ffa500" stroke-width="1.5" stroke-linecap="round" opacity="0.8">
      <line x1="474" y1="104" x2="470" y2="100"/>
      <line x1="506" y1="103" x2="510" y2="99"/>
      <line x1="472" y1="126" x2="468" y2="130"/>
      <line x1="508" y1="126" x2="512" y2="130"/>
    </g>
  </g>
  <text x="489" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#882222" font-weight="600">せいこう 🎯 まと</text>

  <!-- Scene label -->
  <text x="320" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#889aaa">empty_field_with_target · Style Preview</text>
</svg>
