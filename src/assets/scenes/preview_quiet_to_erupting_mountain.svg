<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <defs>
    <linearGradient id="calmSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ac0f0"/>
      <stop offset="100%" stop-color="#b8e4f8"/>
    </linearGradient>
    <linearGradient id="eruptSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a040"/>
      <stop offset="60%" stop-color="#f0c870"/>
      <stop offset="100%" stop-color="#b8e4f8"/>
    </linearGradient>
    <clipPath id="lc"><rect x="12" y="12" width="278" height="220" rx="16"/></clipPath>
    <clipPath id="rc"><rect x="350" y="12" width="278" height="220" rx="16"/></clipPath>
  </defs>

  <rect width="640" height="280" rx="20" fill="#f0ece8"/>

  <!-- ── LEFT: INITIAL (calm mountain) ─────────────────── -->
  <g clip-path="url(#lc)">
    <rect x="12" y="12" width="278" height="220" rx="16" fill="url(#calmSky)"/>
    <!-- Ground -->
    <rect x="12" y="192" width="278" height="40" fill="#5ab55a"/>
    <!-- Rolling hills -->
    <ellipse cx="12"  cy="192" rx="60" ry="20" fill="#5ab55a"/>
    <ellipse cx="290" cy="192" rx="60" ry="20" fill="#5ab55a"/>
    <!-- Mountain shadow -->
    <polygon points="52,192 151,60 250,192" fill="#6a8855" opacity="0.3"/>
    <!-- Mountain body -->
    <polygon points="60,194 151,62 242,194" fill="#7a9060"/>
    <!-- Snow cap -->
    <polygon points="136,90 151,62 166,90 155,86 151,76 147,86" fill="white"/>
    <!-- White cloud -->
    <ellipse cx="230" cy="80" rx="36" ry="20" fill="white"/>
    <ellipse cx="208" cy="88" rx="24" ry="16" fill="white"/>
    <ellipse cx="252" cy="88" rx="22" ry="16" fill="white"/>
    <!-- Small cloud -->
    <ellipse cx="55" cy="100" rx="24" ry="14" fill="white" opacity="0.85"/>
    <ellipse cx="40"  cy="107" rx="16" ry="11" fill="white" opacity="0.85"/>
    <ellipse cx="70"  cy="107" rx="16" ry="11" fill="white" opacity="0.85"/>
  </g>
  <text x="151" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#557" font-weight="600">初期 · かざん</text>

  <!-- ── ARROW ── -->
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#a0b0c0">→</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#90a0b0">「かざん!」</text>

  <!-- ── RIGHT: SUCCESS (erupting) ─────────────────────── -->
  <g clip-path="url(#rc)">
    <rect x="350" y="12" width="278" height="220" rx="16" fill="url(#eruptSky)"/>
    <!-- Ground -->
    <rect x="350" y="192" width="278" height="40" fill="#5ab55a"/>
    <ellipse cx="350" cy="192" rx="60" ry="20" fill="#5ab55a"/>
    <ellipse cx="628" cy="192" rx="60" ry="20" fill="#5ab55a"/>
    <!-- Mountain shadow -->
    <polygon points="390,194 489,62 578,194" fill="#6a8855" opacity="0.3"/>
    <!-- Mountain body -->
    <polygon points="398,194 489,64 580,194" fill="#7a9060"/>
    <!-- Snow cap -->
    <polygon points="474,92 489,64 504,92 493,88 489,78 485,88" fill="white"/>
    <!-- Smoke puff at summit -->
    <ellipse cx="489" cy="50" rx="28" ry="18" fill="#cccccc" opacity="0.9"/>
    <ellipse cx="468" cy="40" rx="18" ry="14" fill="#cccccc" opacity="0.75"/>
    <ellipse cx="510" cy="38" rx="16" ry="13" fill="#dddddd" opacity="0.8"/>
    <ellipse cx="489" cy="28" rx="14" ry="11" fill="#e0e0e0" opacity="0.6"/>
    <!-- Lava sparks / fire particles -->
    <g fill="#ff5500">
      <circle cx="475" cy="68" r="4"/>
      <circle cx="500" cy="62" r="3"/>
      <circle cx="485" cy="58" r="3.5"/>
    </g>
    <g fill="#ff8800">
      <circle cx="468" cy="75" r="3"/>
      <circle cx="508" cy="72" r="2.5"/>
      <circle cx="480" cy="80" r="2"/>
    </g>
    <g fill="#ffcc00">
      <circle cx="462" cy="82" r="2.5"/>
      <circle cx="515" cy="78" r="2"/>
      <circle cx="494" cy="70" r="2"/>
    </g>
    <!-- Shake effect: duplicate mountain outline slightly offset, faint -->
    <polygon points="400,194 491,66 582,194" fill="none" stroke="#c0a060" stroke-width="2" opacity="0.25"/>
    <!-- Dust cloud at base -->
    <ellipse cx="420" cy="192" rx="22" ry="8" fill="#c8b88a" opacity="0.4"/>
    <ellipse cx="560" cy="192" rx="18" ry="7" fill="#c8b88a" opacity="0.35"/>
  </g>
  <text x="489" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#883300" font-weight="600">せいこう 🌋 かざん</text>

  <text x="320" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#889aaa">quiet_to_erupting_mountain · Style Preview</text>
</svg>
