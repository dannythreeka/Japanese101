<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <defs>
    <linearGradient id="woodTableL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a878"/>
      <stop offset="100%" stop-color="#a07848"/>
    </linearGradient>
    <linearGradient id="woodTableR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8a878"/>
      <stop offset="100%" stop-color="#a07848"/>
    </linearGradient>
    <linearGradient id="scrollGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9a6030"/>
      <stop offset="30%" stop-color="#c88848"/>
      <stop offset="50%" stop-color="#d89858"/>
      <stop offset="70%" stop-color="#c88848"/>
      <stop offset="100%" stop-color="#9a6030"/>
    </linearGradient>
    <clipPath id="lScroll"><rect x="12" y="12" width="278" height="220" rx="16"/></clipPath>
    <clipPath id="rScroll"><rect x="350" y="12" width="278" height="220" rx="16"/></clipPath>
  </defs>

  <!-- Card background -->
  <rect width="640" height="280" rx="20" fill="#f0ece8"/>

  <!-- ── LEFT: INITIAL (table with rolled scroll) ─────────── -->
  <g clip-path="url(#lScroll)">
    <!-- Room wall -->
    <rect x="12" y="12" width="278" height="220" rx="16" fill="#f0ebe0"/>
    <!-- Table surface -->
    <rect x="12" y="148" width="278" height="84" fill="url(#woodTableL)"/>
    <!-- Table top edge highlight -->
    <rect x="12" y="148" width="278" height="8" fill="#d8b880"/>
    <!-- Wood grain lines -->
    <g stroke="#b08840" stroke-width="1" opacity="0.4">
      <line x1="30"  y1="160" x2="50"  y2="232"/>
      <line x1="70"  y1="155" x2="90"  y2="232"/>
      <line x1="110" y1="158" x2="130" y2="232"/>
      <line x1="150" y1="154" x2="170" y2="232"/>
      <line x1="190" y1="156" x2="210" y2="232"/>
      <line x1="230" y1="160" x2="250" y2="232"/>
      <line x1="265" y1="155" x2="280" y2="210"/>
    </g>
    <!-- Table legs visible at bottom -->
    <rect x="40"  y="220" width="14" height="12" rx="3" fill="#8a6030"/>
    <rect x="238" y="220" width="14" height="12" rx="3" fill="#8a6030"/>
    <!-- Scroll shadow -->
    <ellipse cx="151" cy="172" rx="58" ry="8" fill="#7a5020" opacity="0.25"/>
    <!-- Rolled scroll (cylinder) — main body -->
    <rect x="88" y="136" width="126" height="36" rx="18" fill="url(#scrollGrad)"/>
    <!-- Scroll end caps (dark circles) -->
    <ellipse cx="88"  cy="154" rx="10" ry="18" fill="#7a4818"/>
    <ellipse cx="214" cy="154" rx="10" ry="18" fill="#7a4818"/>
    <!-- Scroll highlight (sheen on cylinder) -->
    <ellipse cx="148" cy="146" rx="50" ry="5" fill="white" opacity="0.18"/>
    <!-- Scroll tie ribbon in middle -->
    <rect x="143" y="136" width="16" height="36" rx="2" fill="#c03030" opacity="0.7"/>
    <ellipse cx="151" cy="154" rx="8" ry="18" fill="none" stroke="#a02020" stroke-width="1.5" opacity="0.5"/>
    <!-- Small ink bottle beside scroll -->
    <rect x="228" y="145" width="16" height="22" rx="4" fill="#2a2a5a"/>
    <rect x="230" y="140" width="12" height="8" rx="3" fill="#3a3a7a"/>
    <ellipse cx="236" cy="148" rx="5" ry="2" fill="#4a4a9a" opacity="0.5"/>
    <!-- Brush lying flat -->
    <rect x="50" y="160" width="60" height="5" rx="2.5" fill="#8b5e3c"/>
    <ellipse cx="50" cy="162" rx="5" ry="4" fill="#222" opacity="0.7"/>
    <rect x="100" y="161" width="12" height="3" rx="1" fill="#aaa"/>
  </g>
  <text x="151" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#557" font-weight="600">初期 · かみ</text>

  <!-- ── ARROW ── -->
  <text x="320" y="128" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#a0b0c0">→</text>
  <text x="320" y="150" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#90a0b0">「かみ!」</text>

  <!-- ── RIGHT: SUCCESS (scroll unrolled flat with brush strokes) -->
  <g clip-path="url(#rScroll)">
    <!-- Room wall -->
    <rect x="350" y="12" width="278" height="220" rx="16" fill="#f0ebe0"/>
    <!-- Table surface -->
    <rect x="350" y="148" width="278" height="84" fill="url(#woodTableR)"/>
    <rect x="350" y="148" width="278" height="8" fill="#d8b880"/>
    <!-- Wood grain lines -->
    <g stroke="#b08840" stroke-width="1" opacity="0.4">
      <line x1="368" y1="160" x2="388" y2="232"/>
      <line x1="408" y1="155" x2="428" y2="232"/>
      <line x1="448" y1="158" x2="468" y2="232"/>
      <line x1="488" y1="154" x2="508" y2="232"/>
      <line x1="528" y1="156" x2="548" y2="232"/>
      <line x1="568" y1="160" x2="588" y2="232"/>
      <line x1="603" y1="155" x2="618" y2="210"/>
    </g>
    <!-- Table legs -->
    <rect x="378" y="220" width="14" height="12" rx="3" fill="#8a6030"/>
    <rect x="576" y="220" width="14" height="12" rx="3" fill="#8a6030"/>
    <!-- Unrolled scroll / paper flat on table -->
    <!-- Paper shadow -->
    <rect x="374" y="100" width="230" height="52" rx="6" fill="#8a6030" opacity="0.15" transform="translate(3,6)"/>
    <!-- Paper body -->
    <rect x="374" y="100" width="230" height="52" rx="6" fill="#fffdf0"/>
    <!-- Paper border / edge tone -->
    <rect x="374" y="100" width="230" height="52" rx="6" fill="none" stroke="#e0d5b8" stroke-width="2"/>
    <!-- Curled left edge of paper -->
    <path d="M374,100 Q367,110 368,126 Q367,140 374,152" fill="#f0ead0" stroke="#d8cdb0" stroke-width="1.5"/>
    <!-- Curled right edge -->
    <path d="M604,100 Q611,110 610,126 Q611,140 604,152" fill="#f0ead0" stroke="#d8cdb0" stroke-width="1.5"/>
    <!-- Scroll roll remnant left (small rolled section) -->
    <ellipse cx="374" cy="126" rx="8" ry="26" fill="#c88848" opacity="0.5"/>
    <!-- Scroll roll remnant right -->
    <ellipse cx="604" cy="126" rx="8" ry="26" fill="#c88848" opacity="0.5"/>
    <!-- Brushstroke ink marks on paper — kanji-like strokes -->
    <!-- Vertical stroke -->
    <path d="M430,112 Q428,126 430,145" stroke="#1a1a2a" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Horizontal cross stroke -->
    <path d="M415,120 Q430,118 445,120" stroke="#1a1a2a" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <!-- Second character strokes -->
    <path d="M468,112 Q466,122 468,135" stroke="#1a1a2a" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M462,112 Q468,110 476,112" stroke="#1a1a2a" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M460,125 Q469,123 478,126" stroke="#1a1a2a" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Third character strokes -->
    <path d="M503,114 Q516,111 528,114" stroke="#1a1a2a" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M516,114 Q514,126 516,142" stroke="#1a1a2a" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M505,128 Q516,126 527,128" stroke="#1a1a2a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Wet ink sheen on last stroke -->
    <ellipse cx="520" cy="140" rx="5" ry="2" fill="#3a3a8a" opacity="0.35"/>
    <!-- Ink bottle (upright) -->
    <rect x="566" y="134" width="16" height="22" rx="4" fill="#2a2a5a"/>
    <rect x="568" y="128" width="12" height="9" rx="3" fill="#3a3a7a"/>
    <ellipse cx="574" cy="136" rx="5" ry="2" fill="#4a4a9a" opacity="0.5"/>
    <!-- Brush (held, leaning against bottle) -->
    <line x1="588" y1="120" x2="574" y2="148" stroke="#8b5e3c" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="588" cy="120" rx="4" ry="6" fill="#111" opacity="0.8" transform="rotate(-30 588 120)"/>
    <!-- Ink drop on table beside paper -->
    <ellipse cx="362" cy="152" rx="6" ry="3" fill="#2a2a5a" opacity="0.4"/>
  </g>
  <text x="489" y="248" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#334" font-weight="600">せいこう 📜 かみ</text>

  <!-- Scene label -->
  <text x="320" y="270" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#889aaa">scroll_unrolls_to_paper · Style Preview</text>
</svg>
